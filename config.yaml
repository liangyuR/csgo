# Real-time aim config
# Edit this file and run:  python main.py realtime --config config.yaml

capture:
  method: mss           # mss (recommended)
  region: full          # full | center_crop
  center_crop_size: 640 # pixels, only used when region: center_crop
  monitor_index: 1      # 1 = primary monitor

model:
  path: model/yolo26n-pose.pt
  confidence: 0.25
  imgsz: 960            # smaller = faster; 416 / 640 / 960
  device: "0"           # "0" = first GPU; "cpu" = CPU-only
  # Optionally restrict to specific classes (leave empty to use all):
  target_class_names: ["person"]
  target_class_ids: [0]

aim:
  mode: pose_head       # pose_head | center | upper_center
  target_strategy: nearest_head_to_center
  min_keypoint_confidence: 0.35
  head_fraction: 0.18   # fallback when pose head keypoints are missing
  fov_radius: 200       # pixel radius -- targets outside are ignored
  smoothing: 0.4        # lerp factor: 0.0 = no movement, 1.0 = instant snap
  sensitivity: 1.0      # multiplier to match in-game mouse sensitivity

hotkeys:
  toggle: f2            # hold to enable auto aim
  exit: f10             # immediately stops the program
  mode: hold            # hold | toggle

debug:
  enabled: true
  window_width: 360
  window_height: 230
  top_right_margin: 24
  refresh_ms: 150
  perf_log_interval_sec: 5.0
  save_frames: true
  save_interval_sec: 5.0
  output_dir: outputs/realtime_debug

runtime:
  log_interval_sec: 5.0
  warmup_frames: 1
  max_stale_frame_ms: 500.0
  capture_sleep_ms: 1.0
